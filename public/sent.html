<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lời nhắn đã gửi | TimeCapsule</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="https://fav.farm/⏳" />
    <link rel="stylesheet" href="style.css">
    
    <!-- Components -->
    <script src="components/header.js"></script>
    <script src="components/sidebar.js"></script>
    <script src="components/create-note-modal.js"></script>
    <script src="components/view-note-modal.js"></script>
    <script src="components/note-card.js"></script>
    <script src="components/search-bar.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
</head>

<body class="bg-indigo-50/50 dark:bg-slate-900 min-h-screen p-4 md:p-10">
    <main class="max-w-6xl mx-auto mt-10">
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-6 bg-white/40 dark:bg-indigo-950/20 backdrop-blur-xl p-8 rounded-3xl border border-white/50 dark:border-white/5 shadow-xl">
            <div>
                <h1 class="text-4xl font-black text-slate-800 dark:text-white flex items-center gap-3">
                    Nhật ký gửi đi <span class="text-3xl">📤</span>
                </h1>
                <p class="text-slate-500 dark:text-slate-400 font-medium mt-1">Danh sách những viên nhộng thời gian bạn đã niêm phong.</p>
            </div>
            <button onclick="toggleModal(true)"
                class="bg-indigo-600 text-white px-8 py-4 rounded-2xl hover:bg-indigo-700 shadow-xl transition-all active:scale-95 font-bold flex items-center gap-2">
                <span>+</span> Niêm phong lời nhắn mới
            </button>
        </div>

        <!-- Search UI Container -->
        <div id="search-container"></div>

        <!-- Notes List Container -->
        <div id="notes-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            <div class="col-span-full flex justify-center py-20">
                <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
            </div>
        </div>
    </main>


    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'login.html';

        async function loadNotes(search = '', sort = 'newest') {
            const container = document.getElementById('notes-container');
            try {
                const query = `?search=${encodeURIComponent(search)}&sort=${sort}`;
                const res = await fetch('/api/notes/sent' + query, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!res.ok) {
                    if (res.status === 401) {
                        localStorage.clear();
                        window.location.href = 'login.html';
                        return;
                    }
                    throw new Error('Lỗi máy chủ');
                }

                const notes = await res.json();

                if (!Array.isArray(notes) || notes.length === 0) {
                    container.innerHTML = `
                        <div class="col-span-full text-center py-20 bg-white/40 dark:bg-slate-800/40 rounded-3xl border border-dashed border-slate-300 dark:border-slate-700">
                            <p class="text-slate-400 dark:text-slate-500 text-xl font-medium mb-6">Bạn chưa gửi lời nhắn nào phù hợp.</p>
                            <button onclick="toggleModal(true)" class="bg-indigo-600 text-white px-8 py-3 rounded-full font-bold hover:shadow-lg transition">Gửi lời nhắn mới ngay!</button>
                        </div>`;
                    return;
                }

                container.innerHTML = notes.map(note => renderNoteCard(note, 'sent')).join('');

                updateCountdowns();
            } catch (err) {
                console.error(err);
                container.innerHTML = `<p class="col-span-full text-center text-red-500 py-20 font-bold">⚠️ Không thể kết nối đến cỗ máy thời gian!</p>`;
            }
        }

        function updateCountdowns() {
            const timers = document.querySelectorAll('.countdown-timer');
            timers.forEach(timer => {
                const targetDate = new Date(timer.getAttribute('data-date')).getTime();
                const now = new Date().getTime();
                const distance = targetDate - now;

                if (distance < 0) {
                    timer.innerHTML = `<span class="flex items-center gap-1.5 text-blue-500 font-black">🔓 Đã đến tay người nhận</span>`;
                    return;
                }

                const d = Math.floor(distance / (1000 * 60 * 60 * 24));
                const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((distance % (1000 * 60)) / 1000);

                timer.innerHTML = `<div class="flex items-center gap-2 text-indigo-600 font-bold text-sm uppercase"><span>Niêm phong:</span><span>${d}d ${h}h ${m}m ${s}s</span></div>`;
            });
        }

        async function deleteNote(id) {
            if (!confirm("⚠️ Bạn muốn tiêu hủy viên nhộng thời gian này vĩnh viễn?")) return;
            try {
                const res = await fetch(`/api/notes/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    alert("🚀 Đã tiêu hủy thành công!");
                    loadNotes();
                }
            } catch (err) { alert("Lỗi khi xóa!"); }
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderSearchUI('search-container', (search, sort) => {
                loadNotes(search, sort);
            });
            loadNotes();
            setInterval(updateCountdowns, 1000);
        });
    </script>
</body>
</html>
