<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cỗ Máy Thời Gian - Đăng nhập & Đăng ký</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen p-6">
    <div class="glass-effect p-8 rounded-2xl shadow-2xl w-full max-w-md">
        <h2 id="form-title" class="text-3xl font-bold text-center text-gray-800 mb-8">Đăng Nhập</h2>

        <form id="auth-form" class="space-y-5">
            <div id="name-field" class="hidden">
                <label class="block text-sm font-medium text-gray-700">Họ và Tên</label>
                <input type="text" id="name"
                    class="w-full mt-1 p-3 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Email</label>
                <input type="email" id="email" required
                    class="w-full mt-1 p-3 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Mật khẩu</label>
                <input type="password" id="password" required
                    class="w-full mt-1 p-3 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
            </div>

            <div id="forgot-password-link" class="text-right">
                <button type="button" onclick="toggleModal(true)" class="text-xs text-indigo-600 hover:underline">Quên
                    mật khẩu?</button>
            </div>

            <button type="submit"
                class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition-all shadow-lg active:scale-95">
                Xác Nhận
            </button>
        </form>

        <p class="text-center mt-6 text-sm text-gray-600">
            <span id="toggle-text">Chưa có tài khoản?</span>
            <button id="toggle-btn" class="text-indigo-600 font-bold ml-1 underline hover:text-indigo-800">Đăng ký
                ngay</button>
        </p>
    </div>

    <div id="forgot-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-xl shadow-xl w-full max-w-sm">
            <h3 class="text-xl font-bold mb-4 text-gray-800">Khôi phục mật khẩu</h3>
            <p class="text-sm text-gray-600 mb-4">Nhập email của bạn, chúng tôi sẽ gửi link đặt lại mật khẩu.</p>
            <input type="email" id="forgot-email" placeholder="email@vi du.com"
                class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500 mb-4">
            <div class="flex space-x-3">
                <button onclick="toggleModal(false)"
                    class="flex-1 px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">Hủy</button>
                <button onclick="handleForgotPassword()"
                    class="flex-1 px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">Gửi
                    Mail</button>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('auth-form');
        const toggleBtn = document.getElementById('toggle-btn');
        const nameField = document.getElementById('name-field');
        const formTitle = document.getElementById('form-title');
        const toggleText = document.getElementById('toggle-text');
        const forgotLink = document.getElementById('forgot-password-link');

        let isLogin = true;

        toggleBtn.addEventListener('click', () => {
            isLogin = !isLogin;
            formTitle.innerText = isLogin ? 'Đăng Nhập' : 'Đăng Ký';
            toggleText.innerText = isLogin ? 'Chưa có tài khoản?' : 'Đã có tài khoản?';
            toggleBtn.innerText = isLogin ? 'Đăng ký ngay' : 'Đăng nhập';
            nameField.classList.toggle('hidden');
            forgotLink.classList.toggle('hidden', !isLogin);
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const name = document.getElementById('name').value;

            const url = isLogin ? '/api/auth/login' : '/api/auth/register';
            const body = isLogin ? { email, password } : { name, email, password };

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = await res.json();

                if (res.ok) {
                    if (isLogin) {
                        localStorage.setItem('token', data.token);
                        localStorage.setItem('user', JSON.stringify(data.user));
                        alert('🎉 Đăng nhập thành công!');
                        window.location.href = 'index.html';
                    } else {
                        alert('✅ Đăng ký thành công! Bạn có thể đăng nhập ngay.');
                        toggleBtn.click();
                    }
                } else {
                    alert('❌ Lỗi: ' + (data.message || 'Có lỗi xảy ra'));
                }
            } catch (err) {
                alert('⚠️ Không thể kết nối server!');
            }
        });

        function toggleModal(show) {
            const modal = document.getElementById('forgot-modal');
            modal.classList.toggle('hidden', !show);
        }

        async function handleForgotPassword() {
            const email = document.getElementById('forgot-email').value;
            if (!email) return alert("Vui lòng nhập email!");

            try {
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();

                alert(data.message || "Kiểm tra email của bạn!");
                if (res.ok) toggleModal(false);
            } catch (err) {
                alert("⚠️ Lỗi hệ thống, vui lòng thử lại sau.");
            }
        }
    </script>
</body>

</html>
