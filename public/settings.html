<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cài đặt | TimeCapsule</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="https://fav.farm/⚙️" />
    <link rel="stylesheet" href="style.css">
    <script src="components/header.js"></script>
    <script src="components/sidebar.js"></script>
    <script src="components/change-password-modal.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script>
        if (localStorage.getItem('theme') === 'dark' ||
            (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
        tailwind.config = { darkMode: 'class' }
    </script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #cbd5e1;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 4px; bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider { background-color: #4f46e5; }
        input:checked+.slider:before { transform: translateX(24px); }
    </style>
</head>

<body class="p-4 md:p-10 bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-white">
    <div class="max-w-3xl mx-auto mt-10">
        <div class="flex items-center justify-between mb-10">
            <h2 class="text-3xl font-bold flex items-center gap-3">
                <span>⚙️</span> Cài đặt
            </h2>
        </div>

        <div class="space-y-6">
            <!-- Theme Setting -->
            <div class="glass-card p-6 flex justify-between items-center shadow-sm border border-slate-200 dark:border-slate-800">
                <div>
                    <h3 class="font-bold text-lg">Chế độ tối (Dark Mode)</h3>
                    <p class="text-sm opacity-60">Thay đổi giao diện phù hợp với môi trường.</p>
                </div>
                <label class="switch">
                    <input type="checkbox" id="dark-mode-toggle">
                    <span class="slider"></span>
                </label>
            </div>

            <!-- Notification Setting -->
            <div class="glass-card p-6 flex justify-between items-center shadow-sm border border-slate-200 dark:border-slate-800">
                <div>
                    <h3 class="font-bold text-lg">Thông báo Email</h3>
                    <p class="text-sm opacity-60">Nhận thông báo khi đến ngày mở khóa thư.</p>
                </div>
                <label class="switch">
                    <input type="checkbox" id="email-notif-toggle" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <!-- Password Change Section -->
            <div class="glass-card p-6 shadow-sm border border-slate-200 dark:border-slate-800">
                <h3 class="font-bold text-lg mb-5">Tài khoản & Bảo mật</h3>
                <div class="space-y-4">
                    <button onclick="togglePasswordModal(true)"
                        class="w-full flex items-center gap-3 px-5 py-4 bg-white dark:bg-slate-900 rounded-2xl font-bold border border-slate-200 dark:border-slate-800 hover:border-indigo-500 transition-all text-left group">
                        <span class="p-2 rounded-lg bg-indigo-50 dark:bg-indigo-900/30 group-hover:scale-110 transition">🔒</span> 
                        <div>
                            <p>Đổi mật khẩu</p>
                            <p class="text-xs opacity-50 font-normal">Cập nhật mật khẩu để bảo vệ tài khoản tốt hơn.</p>
                        </div>
                    </button>
                </div>
            </div>

            <!-- Danger Zone -->
            <div class="glass-card p-6 border border-red-200 dark:border-red-900/30 bg-red-50/50 dark:bg-red-950/20 rounded-[2rem]">
                <h3 class="font-bold text-red-600 dark:text-red-400 mb-2 flex items-center gap-2">
                    <span>⚠️</span> Vùng nguy hiểm
                </h3>
                <p class="text-sm opacity-70 mb-5">Hành động này sẽ xóa toàn bộ dữ liệu của bạn trên hệ thống và không thể hoàn tác.</p>
                <button id="delete-account-btn"
                    class="w-full md:w-auto px-8 py-3 bg-red-600 text-white rounded-xl font-bold hover:bg-red-700 transition-all active:scale-95 shadow-lg shadow-red-200 dark:shadow-none">
                    Xóa vĩnh viễn tài khoản
                </button>
            </div>
        </div>

        <p class="text-center mt-10 text-[10px] uppercase tracking-widest opacity-30">
            TimeCapsule v1.0 • Developed by Tuấn
        </p>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'login.html';

        // 1. Dark Mode
        const toggle = document.getElementById('dark-mode-toggle');
        if (localStorage.getItem('theme') === 'dark') toggle.checked = true;
        toggle.addEventListener('change', () => {
            if (toggle.checked) {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            } else {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            }
        });

        // 2. Email Notification (Local Mock)
        const emailToggle = document.getElementById('email-notif-toggle');
        const savedNotif = localStorage.getItem('email_notif');
        if (savedNotif === 'false') emailToggle.checked = false;
        emailToggle.addEventListener('change', () => {
            localStorage.setItem('email_notif', emailToggle.checked);
        });

        // 3. Delete Account
        document.getElementById('delete-account-btn').onclick = async () => {
            const confirm1 = confirm("⚠️ BẠN CÓ CHẮC CHẮN MUỐN XÓA TÀI KHOẢN?\n\nHành động này sẽ XÓA VĨNH VIỄN toàn bộ lời nhắn và kỷ niệm của bạn.");
            if (!confirm1) return;
            
            const confirm2 = confirm("❌ ĐÂY LÀ LẦN CUỐI CÙNG HỎI LẠI: Bạn sẽ không thể khôi phục lại dữ liệu sau khi xóa. Tiếp tục?");
            if (!confirm2) return;

            try {
                const res = await fetch('/api/auth/delete-account', {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                alert(data.message || "Đã xóa tài khoản.");
                if (res.ok) {
                    localStorage.clear();
                    window.location.href = 'login.html';
                }
            } catch (err) {
                alert("⚠️ Lỗi hệ thống!");
            }
        };
    </script>
</body>

</html>
