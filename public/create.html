<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Viết Lời Nhắn Tương Lai</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-indigo-50 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-lg">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">✍️ Viết cho tương lai</h2>
        <form id="note-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Tiêu đề</label>
                <input type="text" id="title" required
                    class="w-full mt-1 p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"
                    placeholder="Nhập tiêu đề...">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Lời nhắn bí mật</label>
                <textarea id="content" rows="4" required
                    class="w-full mt-1 p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"
                    placeholder="Hãy viết gì đó thật ý nghĩa..."></textarea>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Đính kèm kỷ niệm (Ảnh)</label>
                <div class="mt-1 flex items-center justify-center w-full">
                    <label
                        class="flex flex-col w-full h-32 border-2 border-dashed border-indigo-200 hover:bg-indigo-50 hover:border-indigo-300 transition-all rounded-lg cursor-pointer">
                        <div class="flex flex-col items-center justify-center pt-7">
                            <svg xmlns="http://www.w3.org/2000/svg"
                                class="w-8 h-8 text-indigo-400 group-hover:text-indigo-600" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                            </svg>
                            <p id="file-name" class="pt-1 text-sm tracking-wider text-gray-400">Chọn một tấm ảnh (tùy
                                chọn)</p>
                        </div>
                        <input type="file" id="image-input" accept="image/*" class="hidden" />
                    </label>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Ngày mở (Unlock)</label>
                    <input type="datetime-local" id="availableAt" required class="w-full mt-1 p-2 border rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Email người nhận</label>
                    <input type="email" id="recipientEmail" class="w-full mt-1 p-2 border rounded-lg"
                        placeholder="Để trống nếu gửi cho mình">
                </div>
            </div>
            <button type="submit"
                class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition">
                🚀 Khóa lời nhắn vào dòng thời gian
            </button>
            <a href="index.html" class="block text-center text-sm text-gray-500 mt-4 underline">Quay lại danh sách</a>
        </form>
    </div>

    <script>
        const noteForm = document.getElementById('note-form');
        const submitBtn = noteForm.querySelector('button[type="submit"]');
        const fileInput = document.getElementById('image-input');
        const fileNameDisplay = document.getElementById('file-name');

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                fileNameDisplay.innerText = "📁 " + fileInput.files[0].name;
                fileNameDisplay.classList.remove('text-gray-400');
                fileNameDisplay.classList.add('text-indigo-600', 'font-bold');
            }
        });

        noteForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const token = localStorage.getItem('token');
            if (!token) {
                alert("Bạn cần đăng nhập trước!");
                window.location.href = 'login.html';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = `<svg class="animate-spin h-5 w-5 mr-3 inline text-white" viewBox="0 0 24 24"></svg> Đang niêm phong...`;
            submitBtn.classList.add('opacity-70', 'cursor-not-allowed');

            const formData = new FormData();
            formData.append('title', document.getElementById('title').value);
            formData.append('content', document.getElementById('content').value);
            formData.append('availableAt', document.getElementById('availableAt').value);
            formData.append('recipientEmail', document.getElementById('recipientEmail').value);

            if (fileInput.files[0]) {
                formData.append('image', fileInput.files[0]);
            }

            try {
                const response = await fetch('/api/notes', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    },
                    body: formData
                });

                if (response.ok) {
                    alert('🚀 Lời nhắn đã được gửi vào cỗ máy thời gian!');
                    window.location.href = 'index.html';
                } else {
                    const result = await response.json();
                    alert('❌ Lỗi: ' + (result.message || 'Không thể lưu lời nhắn'));
                    resetButton();
                }
            } catch (error) {
                alert('⚠️ Lỗi kết nối server!');
                resetButton();
            }
        });

        function resetButton() {
            submitBtn.disabled = false;
            submitBtn.innerHTML = '🚀 Khóa lời nhắn vào dòng thời gian';
            submitBtn.classList.remove('opacity-70', 'cursor-not-allowed');
        }
    </script>
</body>

</html>
