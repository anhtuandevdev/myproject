<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viết Lời Nhắn Tương Lai | TimeCapsule</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #e0e7ff 0%, #fae8ff 100%);
            min-height: 100vh;
        }

        .glass-container {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 32px;
        }

        .input-style {
            background: rgba(255, 255, 255, 0.5);
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .input-style:focus {
            border-color: #6366f1;
            background: white;
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.1);
        }

        /* Hiệu ứng mây bay nhẹ nhàng phía sau */
        .cloud {
            position: fixed;
            z-index: -1;
            filter: blur(50px);
            opacity: 0.4;
            border-radius: 50%;
            background: white;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            from {
                transform: translate(-10%, -10%);
            }

            to {
                transform: translate(110%, 110%);
            }
        }
    </style>
</head>

<body class="flex items-center justify-center p-4">
    <div class="cloud w-96 h-96 top-0 left-0"></div>
    <div class="cloud w-64 h-64 bottom-10 right-10" style="animation-delay: -5s;"></div>

    <div class="glass-container p-8 md:p-12 w-full max-w-2xl shadow-2xl relative overflow-hidden">
        <div class="absolute top-0 right-0 p-4 opacity-10 text-8xl pointer-events-none">✍️</div>

        <header class="mb-8">
            <h2 class="text-3xl font-black text-slate-800">Niêm phong ký ức</h2>
            <p class="text-slate-500 font-medium italic mt-1">Những dòng chữ này sẽ du hành qua thời gian để gặp lại
                bạn...</p>
        </header>

        <form id="note-form" class="space-y-6">
            <div>
                <label class="block text-xs font-bold text-indigo-500 uppercase tracking-widest mb-2 ml-1">Tiêu đề lời
                    nhắn</label>
                <input type="text" id="title" required
                    class="w-full p-4 rounded-2xl outline-none input-style text-slate-700 font-semibold"
                    placeholder="Một cái tên thật gợi nhớ...">
            </div>

            <div>
                <label class="block text-xs font-bold text-indigo-500 uppercase tracking-widest mb-2 ml-1">Nội dung bí
                    mật</label>
                <textarea id="content" rows="5" required
                    class="w-full p-4 rounded-2xl outline-none input-style text-slate-700 leading-relaxed"
                    placeholder="Bạn muốn nhắn nhủ điều gì cho chính mình hay ai đó?"></textarea>
            </div>

            <div>
                <label class="block text-xs font-bold text-indigo-500 uppercase tracking-widest mb-2 ml-1">Đính kèm kỷ
                    niệm (Ảnh)</label>
                <label
                    class="group flex flex-col items-center justify-center w-full h-40 border-2 border-dashed border-indigo-200 rounded-2xl cursor-pointer hover:bg-white/50 hover:border-indigo-400 transition-all">
                    <div class="flex flex-col items-center justify-center pt-5 pb-6 text-center px-4">
                        <div id="icon-container" class="mb-3 text-3xl transition-transform group-hover:scale-125">🖼️
                        </div>
                        <p id="file-name" class="text-sm text-slate-400 font-medium">Kéo thả hoặc nhấn để chọn ảnh</p>
                    </div>
                    <input type="file" id="image-input" accept="image/*" class="hidden" />
                </label>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-xs font-bold text-indigo-500 uppercase tracking-widest mb-2 ml-1">Ngày mở
                        (Unlock)</label>
                    <input type="datetime-local" id="availableAt" required
                        class="w-full p-4 rounded-2xl outline-none input-style text-slate-600 font-medium">
                </div>
                <div>
                    <label class="block text-xs font-bold text-indigo-500 uppercase tracking-widest mb-2 ml-1">Email
                        người nhận</label>
                    <input type="email" id="recipientEmail"
                        class="w-full p-4 rounded-2xl outline-none input-style text-slate-600 font-medium"
                        placeholder="Để trống nếu gửi cho mình">
                </div>
            </div>

            <div class="pt-4 flex flex-col gap-4">
                <button type="submit" id="submit-btn"
                    class="w-full bg-slate-900 text-white font-bold py-5 rounded-2xl hover:bg-indigo-600 transition-all shadow-xl hover:shadow-indigo-100 active:scale-95 flex items-center justify-center gap-3">
                    <span id="btn-icon">🚀</span>
                    <span id="btn-text">Khóa lời nhắn vào dòng thời gian</span>
                </button>
                <a href="index.html"
                    class="text-center text-sm font-bold text-slate-400 hover:text-indigo-600 transition tracking-wide">
                    Quay lại danh sách
                </a>
            </div>
        </form>
    </div>

    <script>
        const noteForm = document.getElementById('note-form');
        const submitBtn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');
        const btnIcon = document.getElementById('btn-icon');
        const fileInput = document.getElementById('image-input');
        const fileNameDisplay = document.getElementById('file-name');
        const iconContainer = document.getElementById('icon-container');

        // Hiển thị tên file khi chọn ảnh
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                const name = fileInput.files[0].name;
                fileNameDisplay.innerText = "📁 " + (name.length > 25 ? name.substring(0, 22) + "..." : name);
                fileNameDisplay.classList.add('text-indigo-600', 'font-bold');
                iconContainer.innerText = "✅";
            }
        });

        noteForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const token = localStorage.getItem('token');
            if (!token) {
                alert("Hành trình yêu cầu đăng nhập!");
                window.location.href = 'login.html';
                return;
            }

            // Hiệu ứng Loading
            submitBtn.disabled = true;
            btnText.innerText = "Đang niêm phong ký ức...";
            btnIcon.innerHTML = `<svg class="animate-spin h-5 w-5 text-white" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`;

            const formData = new FormData();
            formData.append('title', document.getElementById('title').value);
            formData.append('content', document.getElementById('content').value);
            formData.append('availableAt', document.getElementById('availableAt').value);

            // SỬA LỖI TẠI ĐÂY: ID đúng là recipientEmail
            formData.append('recipientEmail', document.getElementById('recipientEmail').value);

            if (fileInput.files[0]) {
                formData.append('image', fileInput.files[0]);
            }

            try {
                const response = await fetch('/api/notes', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                        // Không để Content-Type ở đây để trình duyệt tự xử lý FormData
                    },
                    body: formData
                });

                if (response.ok) {
                    alert('🚀 Ký ức đã được khóa thành công!');
                    window.location.href = 'index.html';
                } else {
                    const result = await response.json();
                    alert('❌ Lỗi: ' + (result.message || 'Hệ thống đang bận'));
                    resetButton();
                }
            } catch (error) {
                alert('⚠️ Lỗi kết nối cỗ máy thời gian!');
                resetButton();
            }
        });

        function resetButton() {
            submitBtn.disabled = false;
            btnText.innerText = "Khóa lời nhắn vào dòng thời gian";
            btnIcon.innerText = "🚀";
        }
    </script>
</body>

</html>
