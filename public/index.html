<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeCapsule | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="https://fav.farm/⏳" />

    <link rel="stylesheet" href="style.css">
    <script src="components/header.js"></script>
    <script src="components/sidebar.js"></script>
    <script src="components/create-note-modal.js"></script>
    <script src="components/view-note-modal.js"></script>
    <script src="components/note-card.js"></script>
    <script src="components/search-bar.js"></script>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Dancing+Script:wght@700&display=swap"
        rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        inter: ['Inter', 'sans-serif'],
                        dancing: ['Dancing Script', 'cursive'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .hero-gradient {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
        }

        .stat-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .nav-card {
            transition: all 0.4s ease;
        }

        .nav-card:hover {
            transform: scale(1.02);
        }

        .floating-button {
            box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.4);
        }
    </style>
</head>

<body class="bg-slate-50 dark:bg-slate-900 min-h-screen pb-20">
    <div class="max-w-6xl mx-auto px-4 md:px-8 mt-10">

        <!-- Welcome Section -->
        <div class="mb-12">
            <h1 class="text-4xl font-extrabold text-slate-800 dark:text-white mb-2">Chào bạn quay lại! 👋</h1>
            <p class="text-slate-500 dark:text-slate-400 font-medium">Khám phá và quản lý những món quà từ thời gian của
                bạn.</p>
        </div>

        <!-- SEARCH & SORT SECTION -->
        <div id="search-container"></div>

        <!-- ALL NOTES SECTION -->
        <div id="notes-section" class="mb-16">
            <h2 class="text-2xl font-black text-slate-800 dark:text-white mb-8 flex items-center gap-3">
                <span class="p-2 bg-indigo-100 dark:bg-indigo-900/30 rounded-lg">📜</span>
                Tất cả lời nhắn của bạn
            </h2>
            <div id="notes-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Notes will be loaded here -->
            </div>
        </div>

        <div class="text-center mt-12">
            <button onclick="toggleModal(true)"
                class="floating-button bg-indigo-600 text-white px-10 py-5 rounded-full hover:bg-indigo-700 shadow-2xl transition-all active:scale-95 font-bold text-lg flex items-center gap-3 mx-auto">
                <span class="text-2xl mr-1">✍️</span> Niêm phong lời nhắn mới
            </button>
        </div>
    </div>

    <!-- Background Orbs -->
    <div class="fixed -top-20 -left-20 w-96 h-96 bg-indigo-500/10 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="fixed top-1/2 -right-20 w-80 h-80 bg-violet-500/10 rounded-full blur-[100px] pointer-events-none"></div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'login.html';

        async function updateDashboard(search = '', sort = 'newest') {
            const container = document.getElementById('notes-container');
            container.innerHTML = `<div class="col-span-full py-10 flex justify-center"><div class="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div></div>`;

            try {
                const query = `?search=${search}&sort=${sort}`;
                const [resSent, resRec] = await Promise.all([
                    fetch('/api/notes/sent' + query, { headers: { 'Authorization': `Bearer ${token}` } }),
                    fetch('/api/notes/received' + query, { headers: { 'Authorization': `Bearer ${token}` } })
                ]);

                if (resSent.ok && resRec.ok) {
                    const sentNotes = await resSent.json();
                    const recNotes = await resRec.json();

                    // Cập nhật thống kê (Stats)
                    updateStatsUI(sentNotes, recNotes);

                    // Gộp và hiển thị danh sách
                    const allRaw = [
                        ...sentNotes.map(n => ({ ...n, type: 'sent' })),
                        ...recNotes.map(n => ({ ...n, type: 'received' }))
                    ];

                    // Loại trùng (nếu tự gửi cho mình)
                    let uniqueNotes = Array.from(new Map(allRaw.map(item => [item['_id'], item])).values());

                    // Sắp xếp lại danh sách gộp
                    uniqueNotes.sort((a, b) => {
                        return sort === 'newest'
                            ? new Date(b.createdAt) - new Date(a.createdAt)
                            : new Date(a.createdAt) - new Date(b.createdAt);
                    });

                    if (uniqueNotes.length === 0) {
                        container.innerHTML = `<p class="col-span-full text-center text-slate-400 py-10 font-medium italic">Không tìm thấy lời nhắn nào khớp với yêu cầu...</p>`;
                        return;
                    }

                    container.innerHTML = uniqueNotes.map(note => renderNoteCard(note, note.type)).join('');
                    updateCountdowns();
                }
            } catch (err) {
                console.error("Lỗi Dashboard:", err);
                container.innerHTML = `<p class="col-span-full text-center text-red-500 py-10 font-bold">⚠️ Hệ thống hộp thư gặp sự cố!</p>`;
            }
        }

        function updateStatsUI(sentData, recData) {
            const allNotesRaw = [...sentData, ...recData];
            const uniqueNotes = Array.from(new Map(allNotesRaw.map(item => [item['_id'], item])).values());
            const now = new Date();

            const s = sentData.length;
            const r = recData.length;
            const l = uniqueNotes.filter(n => new Date(n.availableAt) > now).length;
            const u = uniqueNotes.filter(n => new Date(n.availableAt) <= now).length;

            if (window.updateSidebarStats) {
                window.updateSidebarStats(s, r, l, u);
            }
        }

        function updateCountdowns() {
            const timers = document.querySelectorAll('.countdown-timer');
            timers.forEach(timer => {
                const targetDate = new Date(timer.getAttribute('data-date')).getTime();
                const now = new Date().getTime();
                const distance = targetDate - now;

                if (distance < 0) {
                    timer.innerHTML = `<div class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span><span class="text-green-600 font-black">🔓 Đã sẵn sàng</span></div>`;
                    return;
                }

                const d = Math.floor(distance / (1000 * 60 * 60 * 24));
                const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((distance % (1000 * 60)) / 1000);

                timer.innerHTML = `<div class="flex items-center gap-2 text-indigo-500 font-bold"><span class="text-[10px] uppercase opacity-60">Niêm phong:</span><span>${d}d ${h}h ${m}m ${s}s</span></div>`;
            });
        }

        async function deleteNote(id) {
            if (!confirm("⚠️ Bạn muốn tiêu hủy kỷ niệm này?")) return;
            try {
                const res = await fetch(`/api/notes/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    alert("🚀 Đã tiêu hủy thành công!");
                    updateDashboard();
                }
            } catch (err) { alert("Lỗi khi xóa!"); }
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Khởi tạo Search UI Component
            renderSearchUI('search-container', (search, sort) => {
                updateDashboard(search, sort);
            });

            // Tải dữ liệu ban đầu
            updateDashboard();
            setInterval(updateCountdowns, 1000);
        });
    </script>
</body>

</html>
