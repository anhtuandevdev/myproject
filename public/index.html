<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Cỗ Máy Thời Gian</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
        }

        .stat-card {
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .nav-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .nav-card:hover {
            transform: scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-bold text-indigo-900">🕰️ Time Capsule</h1>
                <p class="text-gray-600">Chào mừng trở lại, <span id="user-name"
                        class="font-bold text-indigo-600 text-lg">...</span></p>
            </div>
            <button id="logout-btn"
                class="bg-white/50 hover:bg-red-50 text-red-500 px-5 py-2 rounded-full font-bold transition border border-red-100 shadow-sm">
                Đăng xuất
            </button>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
            <div class="glass-card p-6 text-center stat-card shadow-sm">
                <p class="text-sm text-gray-500 font-semibold uppercase tracking-wider">Đã gửi</p>
                <h3 id="stat-sent" class="text-3xl font-bold text-indigo-600 mt-1">0</h3>
            </div>
            <div class="glass-card p-6 text-center stat-card shadow-sm">
                <p class="text-sm text-gray-500 font-semibold uppercase tracking-wider">Đã nhận</p>
                <h3 id="stat-received" class="text-3xl font-bold text-blue-600 mt-1">0</h3>
            </div>
            <div class="glass-card p-6 text-center stat-card shadow-sm">
                <p class="text-sm text-gray-500 font-semibold uppercase tracking-wider">Đang khóa</p>
                <h3 id="stat-locked" class="text-3xl font-bold text-orange-500 mt-1">0</h3>
            </div>
            <div class="glass-card p-6 text-center stat-card shadow-sm">
                <p class="text-sm text-gray-500 font-semibold uppercase tracking-wider">Đã mở</p>
                <h3 id="stat-unlocked" class="text-3xl font-bold text-green-500 mt-1">0</h3>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">
            <a href="received.html" class="nav-card glass-card p-8 flex items-center gap-6 group">
                <div
                    class="w-20 h-20 bg-blue-100 rounded-2xl flex items-center justify-center text-4xl group-hover:bg-blue-500 group-hover:scale-110 transition duration-300">
                    📩
                </div>
                <div>
                    <h2 class="text-2xl font-bold text-gray-800">Hộp Thư Đến</h2>
                    <p class="text-gray-500 mt-1">Xem lời nhắn người khác gửi cho bạn.</p>
                </div>
            </a>

            <a href="sent.html" class="nav-card glass-card p-8 flex items-center gap-6 group">
                <div
                    class="w-20 h-20 bg-indigo-100 rounded-2xl flex items-center justify-center text-4xl group-hover:bg-indigo-500 group-hover:scale-110 transition duration-300">
                    📤
                </div>
                <div>
                    <h2 class="text-2xl font-bold text-gray-800">Hộp Thư Đi</h2>
                    <p class="text-gray-500 mt-1">Quản lý những bí mật bạn đã gửi đi.</p>
                </div>
            </a>
        </div>

        <div class="text-center">
            <a href="create.html"
                class="inline-flex items-center gap-3 bg-indigo-600 text-white px-10 py-5 rounded-3xl font-bold text-xl hover:bg-indigo-700 hover:shadow-2xl hover:-translate-y-1 transition-all active:scale-95 shadow-xl">
                <span>🚀 Viết lời nhắn mới</span>
            </a>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const userData = JSON.parse(localStorage.getItem('user') || '{}');

        if (!token) window.location.href = 'login.html';
        document.getElementById('user-name').innerText = userData.name || 'Bạn';

        async function fetchStats() {
            const statSent = document.getElementById('stat-sent');
            const statRec = document.getElementById('stat-received');
            const statLocked = document.getElementById('stat-locked');
            const statUnlocked = document.getElementById('stat-unlocked');

            try {
                const [resSent, resRec] = await Promise.all([
                    fetch('/api/notes/sent', { headers: { 'Authorization': `Bearer ${token}` } }),
                    fetch('/api/notes/received', { headers: { 'Authorization': `Bearer ${token}` } })
                ]);

                const sentData = await resSent.json();
                const recData = await resRec.json();

                if (resSent.ok && resRec.ok) {
                    const allNotesRaw = [...sentData, ...recData];
                    const uniqueNotes = Array.from(new Map(allNotesRaw.map(item => [item['_id'], item])).values());

                    const now = new Date();

                    statSent.innerText = sentData.length;
                    statRec.innerText = recData.length;

                    statLocked.innerText = uniqueNotes.filter(n => new Date(n.availableAt) > now).length;
                    statUnlocked.innerText = uniqueNotes.filter(n => new Date(n.availableAt) <= now).length;
                }
            } catch (err) {
                console.error("Lỗi Dashboard:", err);
            }
        }

        document.getElementById('logout-btn').onclick = () => {
            localStorage.clear();
            window.location.href = 'login.html';
        };

        fetchStats();
    </script>
</body>

</html>
