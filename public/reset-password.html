<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu | TimeCapsule</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="https://fav.farm/⏳" />

    <link rel="stylesheet" href="style.css">

    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="login-page flex items-center justify-center min-h-screen p-6">
    <div class="glass-card p-8 shadow-2xl w-full max-w-md border border-white/20">
        <div class="text-center mb-8">
            <div class="inline-block p-4 bg-indigo-100 dark:bg-indigo-900/30 rounded-full mb-4">
                <svg class="w-8 h-8 text-indigo-600 dark:text-indigo-400" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                    </path>
                </svg>
            </div>
            <h2 class="text-3xl font-bold text-slate-800 dark:text-white">Mật khẩu mới</h2>
            <p class="opacity-60 mt-2 text-sm">Vui lòng thiết lập lại mã khóa để tiếp tục hành trình.</p>
        </div>

        <form id="reset-form" class="space-y-5">
            <div>
                <label class="block text-[10px] font-bold text-indigo-500 uppercase tracking-widest mb-1.5 ml-1">Mật
                    khẩu mới</label>
                <input type="password" id="new-password" required minlength="6"
                    class="w-full p-4 rounded-2xl outline-none font-semibold input-style" placeholder="Ít nhất 6 ký tự">
            </div>
            <div>
                <label class="block text-[10px] font-bold text-indigo-500 uppercase tracking-widest mb-1.5 ml-1">Xác
                    nhận mật khẩu</label>
                <input type="password" id="confirm-password" required
                    class="w-full p-4 rounded-2xl outline-none font-semibold input-style"
                    placeholder="Nhập lại mật khẩu">
            </div>

            <button type="submit"
                class="w-full bg-slate-900 dark:bg-indigo-600 text-white font-bold py-4 rounded-2xl hover:bg-indigo-700 transition-all shadow-xl active:scale-95 flex items-center justify-center gap-2">
                <span>Cập nhật mật khẩu</span>
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
            </button>
        </form>

        <div class="text-center mt-8 pt-6 border-t border-slate-100 dark:border-slate-800">
            <a href="login.html" class="text-sm font-bold text-indigo-600 hover:text-indigo-800 transition-colors">
                ← Quay lại đăng nhập
            </a>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            alert("Mã xác nhận không hợp lệ hoặc đã hết hạn!");
            window.location.href = 'login.html';
        }

        const resetForm = document.getElementById('reset-form');

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (newPassword !== confirmPassword) {
                return alert("Mật khẩu xác nhận không khớp!");
            }

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });

                const data = await res.json();
                if (res.ok) {
                    alert('🎉 Chúc mừng! Mật khẩu đã được thay đổi.');
                    window.location.href = 'login.html';
                } else {
                    alert('❌ Lỗi: ' + data.message);
                }
            } catch (err) {
                alert('⚠️ Không thể kết nối server!');
            }
        });
    </script>
</body>

</html>
