<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu - Cỗ Máy Thời Gian</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen p-6">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
        <h2 class="text-3xl font-bold text-center text-gray-800 mb-4">Mật khẩu mới</h2>
        <p class="text-center text-gray-600 mb-8 text-sm">Vui lòng nhập mật khẩu mới cho tài khoản của bạn.</p>

        <form id="reset-form" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700">Mật khẩu mới</label>
                <input type="password" id="new-password" required minlength="6"
                    class="w-full mt-1 p-3 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500 transition-all"
                    placeholder="Ít nhất 6 ký tự">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Xác nhận mật khẩu</label>
                <input type="password" id="confirm-password" required
                    class="w-full mt-1 p-3 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500 transition-all"
                    placeholder="Nhập lại mật khẩu">
            </div>

            <button type="submit"
                class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition-all shadow-lg active:scale-95">
                Cập nhật mật khẩu
            </button>
        </form>

        <div class="text-center mt-6">
            <a href="login.html" class="text-sm text-indigo-600 hover:underline">Quay lại đăng nhập</a>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            alert("Mã xác nhận không hợp lệ hoặc đã hết hạn!");
            window.location.href = 'login.html';
        }

        const resetForm = document.getElementById('reset-form');

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (newPassword !== confirmPassword) {
                return alert("Mật khẩu xác nhận không khớp!");
            }

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });

                const data = await res.json();

                if (res.ok) {
                    alert('🎉 Chúc mừng! Mật khẩu đã được thay đổi.');
                    window.location.href = 'login.html';
                } else {
                    alert('❌ Lỗi: ' + data.message);
                }
            } catch (err) {
                alert('⚠️ Không thể kết nối server!');
            }
        });
    </script>
</body>

</html>
